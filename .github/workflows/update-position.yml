name: Update Hamiruma position

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch position from YB satellite API
        run: |
          curl -s \
            -H "User-Agent: Mozilla/5.0 (compatible; HamirumaTracker/1.0)" \
            -H "Accept: application/json" \
            "https://app.yb.tl/APIX/Blog/GetPositions?keyword=hamiruma&event=16273&_=$(date +%s%3N)" \
            -o position.json
          echo "Fetched $(wc -c < position.json) bytes"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add position.json
          git diff --staged --quiet && echo "No change" || \
            git commit -m "position: $(date -u '+%Y-%m-%d %H:%M UTC')" && git push
